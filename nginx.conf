worker_processes auto;
events {
    worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;

  upstream app {
    server app1:5000;
    server app2:5000;
    server app3:5000;
    server app4:5000;
    server app5:5000;
    server app6:5000;
  }

  server {
    listen 80;
    location / {
      proxy_pass http://app;
    }
  }
}
