name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_NAME: ${{ secrets.DB_NAME }}
      DATABASE_USER: ${{ secrets.DB_USER }}
      DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run python -m app.scripts.init_db
      - run: uv run python -m app.scripts.load_data
      - run: |
          uv run python -c "
          from app import create_app
          from app.database import db
          app = create_app()
          with app.app_context():
              db.execute_sql(\"SELECT setval('users_id_seq', (SELECT MAX(id) FROM users))\")
              db.execute_sql(\"SELECT setval('urls_id_seq', (SELECT MAX(id) FROM urls))\")
              db.execute_sql(\"SELECT setval('events_id_seq', (SELECT MAX(id) FROM events))\")
          "
      - run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=50
