name: Load Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_NAME: hackathon_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run python -m app.scripts.init_db
      - run: uv run python -m app.scripts.load_data
      - name: Install k6

        uses: grafana/setup-k6-action@v1
      - run: |
          uv run python -c "
          from app import create_app
          from app.database import db
          app = create_app()
          with app.app_context():
              db.execute_sql(\"SELECT setval('users_id_seq', (SELECT MAX(id) FROM users))\")
              db.execute_sql(\"SELECT setval('urls_id_seq', (SELECT MAX(id) FROM urls))\")
              db.execute_sql(\"SELECT setval('events_id_seq', (SELECT MAX(id) FROM events))\")
          "
      - name: Start app

        run: |
          uv run gunicorn -w 2 -b 0.0.0.0:5000 "app:create_app()" &
          sleep 5
      - name: Run load test
        run: k6 run --vus 50 --duration 15s k6/load_test.js
