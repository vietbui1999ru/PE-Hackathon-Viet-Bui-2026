name: Load Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_NAME: hackathon_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run python -m app.scripts.init_db
      - run: uv run python -m app.scripts.load_data
      - name: Install k
        uses: grafana/setup-k6-action@v16
      - name: Start app
        run: |
          uv run gunicorn -w 2 -b 0.0.0.0:5000 "app:create_app()" &
          sleep 3
      - name: Run load test
        run: k6 run --vus 50 --duration 15s k6/load_test.js
